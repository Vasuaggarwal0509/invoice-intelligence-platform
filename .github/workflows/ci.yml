# CI gate — runs on every PR + push to main.
#
# Jobs (parallel where independent):
#   lint          — ruff check + ruff format --check
#   test (matrix) — pytest for business_layer and extraction_layer in parallel,
#                   skipping `ocr_heavy` + `dataset_heavy` markers
#   smoke         — full HTTP-stack smoke harness, runs only after `test` passes
#
# All jobs use python 3.12 to match the deployment image. Pip cache keyed on
# the requirements-dev.txt hash so dep changes invalidate it cleanly.
#
# Render (deploy target) reads the repo on push to main and rebuilds — there
# is intentionally NO deploy step in this workflow.

name: CI

on:
  pull_request:
  push:
    branches: [main, business]   # `business` is the active dev branch today

# Cancel in-progress runs when a new commit lands on the same ref — saves
# CI minutes while you're force-pushing iterative fixes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # Ruff is the only dep needed for this job — install it directly to
      # save the ~30s of pulling the full ML stack.
      - name: Install ruff
        run: |
          pip install --upgrade pip
          pip install $(grep -E '^ruff==' requirements-dev.txt)

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  # ---------------------------------------------------------------------
  test:
    name: Test (${{ matrix.layer }}_layer)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer: [business, extraction]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # System deps for libmagic (python-magic), libgl/glib (onnxruntime).
      # libmagic only needed for business_layer tests but installing in both
      # jobs keeps the matrix uniform.
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libmagic1 libgl1 libglib2.0-0

      - name: Install python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run ${{ matrix.layer }}_layer pytest
        run: |
          pytest ${{ matrix.layer }}_layer \
            -m "not ocr_heavy and not dataset_heavy" \
            --tb=short \
            -q
        env:
          # Synthetic secret only — must be >=32 chars per Settings validator.
          PLATFORM_SECRET_KEY: ci-test-secret-${{ github.run_id }}-padding-padding-padding
          PLATFORM_ENV: test
          PLATFORM_SESSION_COOKIE_SECURE: "false"
          PLATFORM_DATABASE_URL: "sqlite:///:memory:"

  # ---------------------------------------------------------------------
  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    needs: test                # only run if both pytest matrix jobs passed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libmagic1 libgl1 libglib2.0-0

      - name: Install python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run smoke harness
        run: python tests/smoke/biz_layer_smoke.py
        env:
          PLATFORM_SECRET_KEY: ci-test-secret-${{ github.run_id }}-padding-padding-padding
          PLATFORM_ENV: test
          PLATFORM_SESSION_COOKIE_SECURE: "false"
          PLATFORM_DATABASE_URL: "sqlite:///:memory:"
