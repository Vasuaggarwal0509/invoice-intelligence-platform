<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Invoice Intelligence</title>
    <link rel="stylesheet" href="/static/business/css/style.css" />
</head>
<body>
    <header id="topbar" hidden>
        <div class="brand">Invoices</div>
        <nav class="topnav">
            <a href="#/dashboard" data-nav="dashboard">Home</a>
            <a href="#/inbox" data-nav="inbox">Inbox</a>
        </nav>
        <button id="logout-btn" type="button" class="link-btn">Log out</button>
    </header>

    <main id="app-root">
        <!-- Views render into here by js/app.js. -->
    </main>

    <!-- Screens as <template> blocks — cloned by JS when rendering. -->

    <template id="view-login">
        <section class="view view-login">
            <h1>Welcome</h1>
            <p class="muted">Enter your phone to continue.</p>
            <form id="form-phone" novalidate>
                <label>
                    <span>Phone number</span>
                    <input type="tel" name="phone" inputmode="tel" required autocomplete="tel"
                           placeholder="+919876543210" />
                </label>
                <button type="submit" class="primary">Send code</button>
                <p class="error" data-role="error" hidden></p>
            </form>
        </section>
    </template>

    <template id="view-otp">
        <section class="view view-otp">
            <h1>Enter the code</h1>
            <p class="muted">We sent a 6-digit code to your phone.</p>
            <form id="form-otp" novalidate>
                <label>
                    <span>Code</span>
                    <input type="text" name="code" inputmode="numeric" required autocomplete="one-time-code"
                           pattern="[0-9]{6}" maxlength="6" />
                </label>
                <label>
                    <span>Business name <em class="muted small">(new users only)</em></span>
                    <input type="text" name="display_name" maxlength="120" autocomplete="organization" />
                </label>
                <button type="submit" class="primary">Continue</button>
                <button type="button" class="link-btn" data-action="back">Use a different number</button>
                <p class="error" data-role="error" hidden></p>
            </form>
        </section>
    </template>

    <template id="view-dashboard">
        <section class="view view-dashboard">
            <h1 data-role="greeting">Welcome back</h1>
            <div class="period-row">
                <p class="muted small" data-role="period">This month</p>
                <div class="period-switch" role="tablist" aria-label="Period">
                    <button type="button" class="period-btn is-active" data-role="period-this">This month</button>
                    <button type="button" class="period-btn" data-role="period-last">Last month</button>
                </div>
            </div>
            <div class="kpi-row">
                <div class="kpi-tile">
                    <div class="kpi-label">Invoices this month</div>
                    <div class="kpi-value" data-role="kpi-count">—</div>
                </div>
                <div class="kpi-tile">
                    <div class="kpi-label">Total spend</div>
                    <div class="kpi-value" data-role="kpi-spend">—</div>
                </div>
                <div class="kpi-tile">
                    <div class="kpi-label">ITC eligible <em class="muted small">est.</em></div>
                    <div class="kpi-value" data-role="kpi-itc">—</div>
                </div>
                <div class="kpi-tile">
                    <div class="kpi-label">Needs review</div>
                    <div class="kpi-value" data-role="kpi-review">—</div>
                </div>
            </div>
            <div class="status-strip" data-role="status-strip" hidden>
                <span class="status-pill is-extracted">
                    <span class="status-dot"></span>
                    <strong data-role="status-extracted">0</strong>&nbsp;extracted
                </span>
                <span class="status-pill is-pending">
                    <span class="status-dot"></span>
                    <strong data-role="status-pending">0</strong>&nbsp;pending
                </span>
                <span class="status-pill is-review">
                    <span class="status-dot"></span>
                    <strong data-role="status-review">0</strong>&nbsp;needs review
                </span>
            </div>

            <div class="upload-card">
                <h2>Add an invoice</h2>
                <p class="muted small">PDF, PNG, JPG, TIFF, or WebP up to 25 MB.</p>
                <form id="form-upload" novalidate>
                    <input type="file" name="file" accept="image/png,image/jpeg,image/tiff,image/webp,application/pdf" required />
                    <button type="submit" class="primary">Upload</button>
                </form>
                <p class="error" data-role="error" hidden></p>
                <p class="muted small" data-role="upload-status" hidden></p>
            </div>

            <section class="top-vendors" data-role="top-vendors-wrap" hidden>
                <h2>Top vendors this month</h2>
                <ul class="vendor-list" data-role="top-vendors-list"></ul>
            </section>

            <section class="needs-review-card" data-role="needs-review-wrap" hidden>
                <h2>Needs your review</h2>
                <ul class="review-list" data-role="needs-review-list"></ul>
            </section>

            <section class="sources-card">
                <h2>Email inbox</h2>
                <div data-role="sources-body">
                    <p class="muted small">
                        Connect your email so invoices arrive automatically —
                        we read only messages whose subject matches invoice-like
                        keywords (editable in <code>config/config.json</code>).
                    </p>
                    <a id="btn-connect-email" class="primary btn-connect"
                       href="/api/oauth/google/start">
                        <span class="spinner" data-role="connect-spinner" hidden></span>
                        <span data-role="connect-label">Connect Email</span>
                    </a>
                    <div data-role="gmail-connected-hint" hidden>
                        <p class="connected-line">
                            <span class="status-dot status-ok" aria-hidden="true"></span>
                            <span>Connected: <strong data-role="gmail-account-label">Gmail</strong></span>
                        </p>
                        <p class="muted small">
                            New invoices arrive every
                            <span data-role="poll-interval">15</span> minutes,
                            or fetch them right now.
                        </p>
                        <div class="gmail-actions">
                            <button type="button" class="primary btn-fetch-now" data-role="gmail-fetch-now">
                                <span class="spinner" data-role="gmail-fetch-spinner" hidden></span>
                                <span data-role="gmail-fetch-label">Fetch now</span>
                            </button>
                            <button type="button" class="link-btn" data-role="gmail-disconnect">Disconnect</button>
                        </div>
                        <p class="fetch-status" data-role="gmail-fetch-status" hidden></p>
                    </div>
                </div>
            </section>

            <section class="ca-link-card">
                <h2>Your CA firm</h2>
                <div data-role="ca-link-unlinked" hidden>
                    <p class="muted small">
                        If your CA firm has registered on this platform, add their 15-digit
                        GSTIN below and they can review your invoices.
                    </p>
                    <form id="form-ca-link" novalidate>
                        <input type="text" name="ca_gstin" maxlength="15"
                               placeholder="22AAAAA0000A1Z5"
                               pattern="[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9][A-Z0-9]Z[A-Z0-9]"
                               required />
                        <button type="submit" class="primary">Link CA</button>
                    </form>
                    <p class="error" data-role="ca-link-error" hidden></p>
                </div>
                <div data-role="ca-link-linked" hidden>
                    <p>
                        Linked with
                        <strong data-role="ca-link-name"></strong>
                        (<span class="muted small" data-role="ca-link-gstin"></span>)
                    </p>
                    <button type="button" class="link-btn" data-role="ca-unlink-btn">Unlink</button>
                </div>
            </section>
        </section>
    </template>

    <template id="view-inbox">
        <section class="view view-inbox">
            <h1>Inbox</h1>
            <div class="inbox-actionbar" data-role="inbox-actionbar" hidden>
                <span class="muted small" data-role="selection-count">0 selected</span>
                <button type="button" class="link-btn" data-role="extract-selected" disabled>Extract selected</button>
                <button type="button" class="primary" data-role="extract-all">Extract all pending</button>
                <span class="extract-status" data-role="extract-status" hidden></span>
            </div>
            <p class="muted small" data-role="empty-hint" hidden>No uploads yet. Start on the home page.</p>
            <div class="inbox-wrapper">
                <table class="inbox-table">
                    <thead>
                        <tr>
                            <th class="col-check"><input type="checkbox" data-role="check-all" aria-label="Select all" /></th>
                            <th>Source</th>
                            <th>From / File</th>
                            <th>Vendor</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody data-role="inbox-body">
                        <!-- JS fills in -->
                    </tbody>
                </table>
            </div>
        </section>
    </template>

    <template id="view-invoice">
        <section class="view view-invoice">
            <a href="#/inbox" class="link-btn back">← Back to inbox</a>
            <div class="invoice-grid">
                <div class="invoice-image-wrap">
                    <img data-role="invoice-image" alt="Invoice preview" />
                </div>
                <div class="invoice-fields">
                    <h1 data-role="vendor">—</h1>
                    <p class="muted small" data-role="status-chip"></p>
                    <dl>
                        <dt>Invoice number</dt><dd data-role="invoice-no">—</dd>
                        <dt>Date</dt><dd data-role="invoice-date">—</dd>
                        <dt>Amount</dt><dd data-role="total">—</dd>
                    </dl>
                    <div class="flags" data-role="flags" hidden>
                        <h2>Things to check</h2>
                        <ul data-role="flags-list"></ul>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <script src="/static/business/js/api.js"></script>
    <script src="/static/business/js/auth.js"></script>
    <script src="/static/business/js/dashboard.js"></script>
    <script src="/static/business/js/inbox.js"></script>
    <script src="/static/business/js/invoice.js"></script>
    <script src="/static/business/js/app.js"></script>
</body>
</html>
